<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIG Ecosocial - Municipio Simón Bolívar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --v-lime: #B4D445; --v-deep: #135242; --negro-card: rgba(20, 22, 21, 0.98); }
        body, html { margin: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; }

        /* Capa del Video */
        #video-contenedor {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 6000; display: none;
            align-items: center; justify-content: center;
        }
        #animacion-video { width: 100%; height: 100%; object-fit: cover; }

        /* Registro */
        #pantalla-registro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--v-lime) 0%, var(--v-deep) 100%);
            z-index: 5000; display: flex; align-items: center; justify-content: center;
        }
        .card-registro {
            background: var(--negro-card); border: 2px solid var(--v-lime);
            width: 550px; padding: 40px; border-radius: 25px; text-align: center;
        }
        .logos-registro { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .logos-registro img { width: 140px; height: auto; }

        /* Sistema */
        #sistema-principal { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; height: 100%; }

        input { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .btn-acceder { background: var(--v-lime); color: var(--v-deep); border: none; padding: 16px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="video-contenedor">
    <video id="animacion-video" muted playsinline preload="auto">
        <source src="video.mp4" type="video/mp4">
    </video>
</div>

<div id="pantalla-registro">
    <div class="card-registro">
        <div class="logos-registro">
            <img src="logo1.png" alt="Logo 1">
            <img src="logo2.png" alt="Logo 2">
        </div>
        <h2 style="color:white; margin:0;">SISTEMA DE GESTIÓN</h2>
        <p style="color:var(--v-lime); font-weight:bold; margin-bottom:30px;">Municipio Simón Bolívar</p>
        
        <input type="email" id="email" placeholder="Correo Electrónico">
        <button class="btn-acceder" onclick="iniciarProceso()">ACCEDER AL SISTEMA</button>
    </div>
</div>

<div id="sistema-principal">
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map;
    var video = document.getElementById('animacion-video');

    function iniciarProceso() {
        const contenedor = document.getElementById('video-contenedor');
        contenedor.style.display = 'flex';

        // Intentamos reproducir el video
        video.play().then(() => {
            // Si el video dura mucho, forzamos el cierre a los 4 segundos
            setTimeout(finalizarVideo, 4000); 
            // O cuando el video termine naturalmente
            video.onended = finalizarVideo;
        }).catch(error => {
            console.log("Error de video: ", error);
            finalizarVideo(); // Si falla, entra directo al mapa
        });
    }

    function finalizarVideo() {
        document.getElementById('video-contenedor').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('video-contenedor').style.display = 'none';
            document.getElementById('pantalla-registro').style.display = 'none';
            document.getElementById('sistema-principal').style.display = 'flex';
            cargarMapa();
        }, 500);
    }

    function cargarMapa() {
        if (!map) {
            map = L.map('map').setView([10.136, -64.686], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([10.136, -64.686]).addTo(map).bindPopup('Barcelona, Anzoátegui').openPopup();
        }
    }
</script>
</body>
</html>
