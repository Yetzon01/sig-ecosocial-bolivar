<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIG Ecosocial - Municipio Simón Bolívar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* VARIABLES Y ESTILOS GLOBALES */
        :root { 
            --v-lime: #B4D445; 
            --v-deep: #135242; 
            --negro-card: rgba(20, 22, 21, 0.98);
            --v-osc: #135242;
            --v-lim: #B4D445;
            --negro: #1a1c1b;
        }
        
        * { box-sizing: border-box; }
        body, html { margin: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; }

        /* --- SECCIÓN 1: LOGIN Y REGISTRO --- */
        #pantalla-registro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--v-lime) 0%, var(--v-deep) 100%);
            z-index: 5000; display: flex; align-items: center; justify-content: center;
        }

        .card-registro {
            background: var(--negro-card); border: 2px solid var(--v-lime);
            width: 650px; padding: 40px; border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5); text-align: center;
        }

        #video-contenedor {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 6000; display: none;
            align-items: center; justify-content: center;
        }
        #animacion-video { width: 100%; height: 100%; object-fit: cover; }

        .logos-registro { display: flex; justify-content: space-between; margin-bottom: 20px; height: 110px; }
        .logo-wrapper { flex: 0 0 160px; height: 110px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .logos-registro img { width: 100%; height: 100%; object-fit: contain; transform: scale(2.0); }

        .tabs-acceso { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: #666; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; transition: 0.3s; padding: 5px 10px; }
        .tab-btn.active { color: var(--v-lime); border-bottom: 2px solid var(--v-lime); }

        h2 { margin: 0; font-size: 24px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { color: var(--v-lime); font-size: 13px; margin-bottom: 30px; font-weight: bold; text-transform: uppercase; }
        
        .form-registro, .form-admin { text-align: left; display: grid; gap: 15px; }
        .form-admin { display: none; }
        .form-row { display: flex; gap: 15px; }
        .form-group { flex: 1; }
        
        #campos-dinamicos-registro { display: none; flex-direction: column; gap: 15px; }

        label { font-size: 11px; color: var(--v-lime); text-transform: uppercase; font-weight: 800; margin-bottom: 5px; display: block; }
        
        input, select { 
            width: 100%; background: #111; border: 1px solid #333; color: white; 
            padding: 12px; border-radius: 8px; outline: none; font-size: 14px; 
            transition: 0.3s;
        }
        
        input:focus, select:focus { border-color: var(--v-lime); background: #1a1a1a; }

        #segmento-otro { display: none; margin-top: 5px; border-left: 3px solid var(--v-lime); padding-left: 15px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .btn-acceder {
            background: var(--v-lime); color: var(--v-deep); border: none;
            padding: 16px; border-radius: 10px; font-weight: 900; cursor: pointer;
            font-size: 15px; margin-top: 20px; text-transform: uppercase; width: 100%;
            box-shadow: 0 5px 15px rgba(180, 212, 69, 0.2);
        }
        .btn-acceder:hover { background: #fff; transform: translateY(-2px); }

        .btn-verificar {
            background: transparent; color: var(--v-lime); border: 1px solid var(--v-lime);
            padding: 8px; border-radius: 8px; font-size: 10px; cursor: pointer; font-weight: bold;
            margin-top: 5px; width: auto; align-self: flex-end;
        }

        /* --- SECCIÓN 2: SISTEMA PRINCIPAL (MAPA) --- */
        #sistema-principal { display: none; width: 100vw; height: 100vh; flex-direction: column; background: #111; color: white; }

        #header { height: 130px; background: var(--v-osc); border-bottom: 5px solid var(--v-lim); position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; flex-shrink: 0; }
        .logo-box { position: absolute; top: 50%; transform: translateY(-50%); width: 260px; height: 120px; display: flex; align-items: center; justify-content: center; }
        .logo-left { left: 20px; } .logo-right { right: 20px; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; transform: scale(2.0); }
        #titulo-principal { font-size: 22px; font-weight: 800; color: #FFFFFF; text-transform: uppercase; margin-bottom: 5px; }

        #contenedor { display: flex; flex-grow: 1; overflow: hidden; }
        #sidebar { width: 440px; background: var(--negro); color: white; padding: 15px; overflow-y: auto; border-right: 2px solid #333; }
        
        /* PANELES ADMIN */
        #panel-admin-comunas { display: none; width: 440px; background: var(--negro); color: white; padding: 15px; overflow-y: auto; border-right: 2px solid #333; }
        .item-comuna-admin { background: #222; border: 1px solid #444; border-radius: 8px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .badge-mapas { background: var(--v-lim); color: var(--v-osc); padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 900; }
        .btn-volver-admin { background: #444; color: #fff; border: none; padding: 10px; border-radius: 5px; font-size: 10px; cursor: pointer; margin-bottom: 10px; width: 100%; font-weight: bold; }

        h4 { color: var(--v-lim); font-size: 11px; text-transform: uppercase; margin: 15px 0 8px 0; border-bottom: 1px solid #444; padding-bottom: 4px; letter-spacing: 1px; }
        .grid-datos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .sidebar-form-group { margin-bottom: 8px; }
        .sidebar-label { display: block; font-size: 9px; color: #888; margin-bottom: 2px; text-transform: uppercase; }
        .sidebar-input, .sidebar-select { width: 100%; background: #222; border: 1px solid #444; color: white; padding: 6px 8px; font-size: 11px; border-radius: 4px; outline: none; }

        .btn-mapa { width: 100%; padding: 8px; margin: 2px 0; background: #252827; color: white; border: 1px solid #444; border-radius: 6px; cursor: pointer; text-align: left; font-size: 10.5px; display: flex; align-items: center; justify-content: space-between; }
        .btn-mapa.activo { background: var(--v-osc) !important; border-color: var(--v-lim); }
        .count-badge { background: #333; color: var(--v-lim); padding: 2px 6px; border-radius: 10px; font-weight: bold; font-size: 10px; }

        #map-container { flex-grow: 1; position: relative; background: #1a1a1a; }
        #map { width: 100%; height: 100%; }

        /* TABLA VOCEROS */
        #panel-voceros-lista {
            position: fixed; bottom: 20px; right: 20px; width: 80%; max-height: 400px;
            background: var(--negro-card); border: 2px solid var(--v-lim); z-index: 4000;
            border-radius: 15px; display: none; flex-direction: column; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .header-panel-v { background: var(--v-osc); padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .table-container { overflow-y: auto; flex-grow: 1; padding: 10px; }
        table { width: 100%; border-collapse: collapse; color: white; font-size: 12px; }
        th { background: #333; color: var(--v-lim); text-align: left; padding: 8px; border-bottom: 2px solid var(--v-lim); }
        td { padding: 8px; border-bottom: 1px solid #444; }
    </style>
</head>
<body>

<div id="video-contenedor">
    <video id="animacion-video" muted>
        <source src="video.mp4.mp4" type="video/mp4">
    </video>
</div>

<div id="pantalla-registro">
    <div class="card-registro">
        <div class="logos-registro">
            <div class="logo-wrapper"><img src="logo1.png.png"></div>
            <div class="logo-wrapper"><img src="logo2.png.png"></div>
        </div>
        
        <h2>SISTEMA DE GESTIÓN</h2>
        <p class="subtitle">Municipio Simón Bolívar</p>

        <div class="tabs-acceso">
            <button class="tab-btn active" onclick="cambiarSeccion('registro')">Registro Vocero</button>
            <button class="tab-btn" onclick="cambiarSeccion('admin')">Administrador</button>
        </div>
        
        <form id="form-registro-principal" class="form-registro" onsubmit="event.preventDefault(); registrarVocero();">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <div style="display: flex; gap: 10px;">
                    <input type="email" id="regCor" placeholder="ejemplo@correo.com" required oninput="limpiarSiVacio(this.value)">
                    <button type="button" class="btn-verificar" onclick="verificarCorreo()">VERIFICAR</button>
                </div>
            </div>

            <div id="campos-dinamicos-registro">
                <div class="form-row">
                    <div class="form-group"><label>Nombres</label><input type="text" id="regNom" required></div>
                    <div class="form-group"><label>Apellidos</label><input type="text" id="regApe" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Cédula</label><input type="text" id="regCed" required></div>
                    <div class="form-group"><label>Teléfono</label><input type="tel" id="regTel" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Comuna</label><input type="text" id="regCom" required></div>
                    <div class="form-group"><label>Sector</label><input type="text" id="regSec" required></div>
                </div>
                <div class="form-group">
                    <label>Vocería a la que pertenece</label>
                    <select id="selectVoceria" onchange="controlarOtro(this.value)">
                        <option value="" disabled selected>Seleccione una opción</option>
                        <option value="Vocero de Ecosocialismo">Vocero de Ecosocialismo</option>
                        <option value="otro">Otro (Especificar)</option>
                    </select>
                </div>
                <div id="segmento-otro">
                    <label>Especifique su Vocería</label>
                    <input type="text" id="inputOtro" placeholder="¿Cuál es su vocería?">
                </div>
                <button type="submit" id="btnIngresar" class="btn-acceder">INGRESAR Y GUARDAR REGISTRO</button>
            </div>
        </form>

        <form id="form-admin-acceso" class="form-admin" onsubmit="event.preventDefault(); validarAdmin();">
            <div class="form-group"><label>Correo Administrativo</label><input type="email" id="adminEmail" placeholder="admin@bolivar.gob.ve" required></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="adminPass" placeholder="••••••••" required></div>
            <button type="submit" class="btn-acceder">INICIAR SESIÓN ADMIN</button>
        </form>
    </div>
</div>

<div id="sistema-principal">
    <div id="header">
        <div class="logo-box logo-left"><img src="logo1.png.png"></div>
        <div id="titulo-principal">MAPA DE RIESGOS COMUNITARIOS</div>
        <div style="color: #B4D445; font-size: 13px; font-weight: bold;">Municipio Simón Bolívar - Anzoátegui</div>
        <div class="logo-box logo-right"><img src="logo2.png.png"></div>
    </div>

    <div id="contenedor">
        <div id="panel-admin-comunas">
            <h4 style="color:var(--v-lim)">🛡️ PANEL DE CONTROL ADMINISTRATIVO</h4>
            <button class="btn-acceder" style="margin-bottom: 15px; padding: 10px; font-size: 11px;" onclick="togglePanelVoceros()">📋 VER LISTADO DE VOCEROS REGISTRADOS</button>
            <div id="lista-comunas-admin"></div>
        </div>

        <div id="sidebar">
            <button id="btnVolverAdmin" class="btn-volver-admin" style="display:none" onclick="volverAPanelAdmin()">⬅️ VOLVER AL PANEL ADMIN</button>
            <h4>📍 Información Territorial</h4>
            <div class="grid-datos">
                <div class="sidebar-form-group" style="grid-column: span 2;">
                    <label class="sidebar-label">Comuna Seleccionada</label>
                    <input type="text" id="comunaActiva" class="sidebar-input" readonly>
                </div>
                <div class="sidebar-form-group"><label class="sidebar-label">Cant. Calles</label><input type="number" class="sidebar-input" value="0"></div>
                <div class="sidebar-form-group"><label class="sidebar-label">Asfaltadas</label><input type="number" class="sidebar-input" value="0"></div>
            </div>
            
            <h4>⚠️ Factores de Riesgo</h4>
            <button class="btn-mapa" onclick="activarEmoji('🌊','inund')"><div>🌊 Zona Inundable</div> <span class="count-badge" id="count-inund">0</span></button>
            <button class="btn-mapa" onclick="activarEmoji('🏚️','casa_r')"><div>🏚️ Vivienda en Riesgo</div> <span class="count-badge" id="count-casa_r">0</span></button>
            <button class="btn-mapa" onclick="activarEmoji('🗑️','basura')"><div>🗑️ Foco Crítico Basura</div> <span class="count-badge" id="count-basura">0</span></button>
            
            <button class="btn-acceder" style="margin-top:20px;" onclick="guardarMapaActual()">💾 GUARDAR MAPA EN MEMORIA</button>
        </div>

        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>
</div>

<div id="panel-voceros-lista">
    <div class="header-panel-v">
        <h4 style="margin:0; color:white;">👥 VOCEROS REGISTRADOS</h4>
        <button onclick="togglePanelVoceros()" style="background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">X</button>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th><th>Cédula</th><th>Teléfono</th><th>Correo</th><th>Comuna</th><th>Vocería</th>
                </tr>
            </thead>
            <tbody id="tbody-voceros"></tbody>
        </table>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- MEMORIA DEL SISTEMA ---
    let dbVoceros = JSON.parse(localStorage.getItem('SIG_Voceros')) || [];
    let dbMapasCount = JSON.parse(localStorage.getItem('SIG_Mapas_Count')) || {};
    let rolUsuario = "usuario";
    var map;

    const listaComunas = [
        "4F-92 COMANDANTE ETERNO HUGO RAFAEL CHAVEZ", "AGROINDUSTRIAL CACIQUE GUAICAIPURO", "AGROECOLOGICA Y TURISTICA BERGANTIN",
        "AGROTURISTICA Y SOCIALISTA LA FE DE TODOS", "ANTONIO RICAURTE 4F", "DESPERTAR CUMANAGOTO", "DONATO CONSTANTINO MARADEI",
        "ECO AMBIENTAL EL GRAN EL SAMAN DORADO", "EZEQUIEL ZAMORA", "FRANCISCO DE MIRANDA DE CRUZ VERDE", "GOLPE DE TIMON",
        "GRUTA SAN FELIPE NERI", "GUERREROS DE BOYACA", "HUGO CHAVEZ FRIAS 2013", "INDIGENA CUMANAGOTO SAN BERNARDINO",
        "INDIGENA GRAN CACIQUE CAYAURIMA", "INDIOS CUMANAGOTOS", "JOSE ANTONIO ANZOATEGUI 14-15", "JUANA PETRONILA HERNANDEZ",
        "LAS ORQUIDEAS DE CHAVEZ", "LINA RON", "LOS ESFUERZOS EN VICTORIA", "LOS HIJOS REBELDES DE CHAVEZ", "LOS MESONES UNIDOS CON CHAVEZ",
        "LUISA CACERES DE ARISMENDI", "MI GRAN BARCELONA", "PARQUE VIDOÑO", "POR EL LEGADO DEL COMANDANTE CHAVEZ", "POTOTUCUAL",
        "PRODUCTIVA LA LUCHA DE UN PUEBLO UNIDO", "PRODUCTIVA VENCEDORES DE LA PATRIA", "SIMON BOLIVAR NARICUAL", "SOCIO PRODUCTIVA SIMON BOLIVAR",
        "SOCIALISTA BAHIA DE BARCELONA SIMON BOLIVAR", "SOCIALISTA EL VIÑEDO", "SOCIALISTA INDIGENA EL PILAR DE LOS CUMANAGOTOS",
        "SOCIALISTA LA VICTORIA PERFECTA 29 DE MARZO", "SOCIALISTA MAYORQUIN III", "SOCIALISTA TRIUNFADORES INDIGENAS CUMANAGOTOS",
        "SOCIALISTA VALLES DEL NEVERI", "SOCIOPRODUCTIVA BICENTENARIO DE LA INDEPENDENCIA", "VENCEDORES INDIGENAS CUMANAGOTO"
    ];

    // Inicializar contadores si están vacíos
    listaComunas.forEach(c => { if(!dbMapasCount[c]) dbMapasCount[c] = 0; });

    // --- LÓGICA DE REGISTRO Y LOGIN ---
    function verificarCorreo() {
        const correo = document.getElementById('regCor').value.toLowerCase().trim();
        if(!correo) return alert("Ingrese un correo");
        
        const campos = document.getElementById('campos-dinamicos-registro');
        campos.style.display = 'flex';

        const usuario = dbVoceros.find(v => v.cor === correo);
        if(usuario) {
            document.getElementById('regNom').value = usuario.nom;
            document.getElementById('regApe').value = usuario.ape;
            document.getElementById('regCed').value = usuario.ced;
            document.getElementById('regTel').value = usuario.tel;
            document.getElementById('regCom').value = usuario.com;
            document.getElementById('regSec').value = usuario.sec;
            document.getElementById('btnIngresar').innerText = "BIENVENIDO - INGRESAR";
        } else {
            limpiarCampos();
            document.getElementById('btnIngresar').innerText = "REGISTRAR Y ENTRAR";
        }
    }

    function registrarVocero() {
        const correo = document.getElementById('regCor').value.toLowerCase().trim();
        const vocero = {
            nom: document.getElementById('regNom').value,
            ape: document.getElementById('regApe').value,
            ced: document.getElementById('regCed').value,
            tel: document.getElementById('regTel').value,
            cor: correo,
            com: document.getElementById('regCom').value,
            sec: document.getElementById('regSec').value,
            voceria: document.getElementById('selectVoceria').value
        };

        const index = dbVoceros.findIndex(v => v.cor === correo);
        if(index !== -1) dbVoceros[index] = vocero;
        else dbVoceros.push(vocero);

        localStorage.setItem('SIG_Voceros', JSON.stringify(dbVoceros));
        reproducirAnimacion('usuario');
    }

    function validarAdmin() {
        const u = document.getElementById('adminEmail').value;
        const p = document.getElementById('adminPass').value;
        if((u === "yetzonmora@gmail.com" && p === "32568263") || (u === "andreinacastro040789@gmail.com" && p === "andreina123")) {
            rolUsuario = "admin";
            reproducirAnimacion('admin');
        } else alert("Acceso Denegado");
    }

    function reproducirAnimacion(rol) {
        document.getElementById('video-contenedor').style.display = 'flex';
        const v = document.getElementById('animacion-video');
        v.play();
        v.onended = () => {
            document.getElementById('video-contenedor').style.display = 'none';
            document.getElementById('pantalla-registro').style.display = 'none';
            document.getElementById('sistema-principal').style.display = 'flex';
            if(rol === 'admin') mostrarPanelAdmin();
            else document.getElementById('comunaActiva').value = document.getElementById('regCom').value;
            inicializarMapa();
        };
    }

    // --- PANEL ADMINISTRATIVO ---
    function mostrarPanelAdmin() {
        document.getElementById('sidebar').style.display = 'none';
        document.getElementById('panel-admin-comunas').style.display = 'block';
        const lista = document.getElementById('lista-comunas-admin');
        lista.innerHTML = "";

        listaComunas.forEach(comuna => {
            const div = document.createElement('div');
            div.className = 'item-comuna-admin';
            div.onclick = () => entrarAComunaAdmin(comuna);
            div.innerHTML = `<span>${comuna}</span> <span class="badge-mapas">${dbMapasCount[comuna]}</span>`;
            lista.appendChild(div);
        });
        actualizarTablaVoceros();
    }

    function entrarAComunaAdmin(comuna) {
        document.getElementById('panel-admin-comunas').style.display = 'none';
        document.getElementById('sidebar').style.display = 'block';
        document.getElementById('btnVolverAdmin').style.display = 'block';
        document.getElementById('comunaActiva').value = comuna;
    }

    function volverAPanelAdmin() {
        document.getElementById('sidebar').style.display = 'none';
        document.getElementById('panel-admin-comunas').style.display = 'block';
    }

    function togglePanelVoceros() {
        const p = document.getElementById('panel-voceros-lista');
        p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
    }

    function actualizarTablaVoceros() {
        const tbody = document.getElementById('tbody-voceros');
        tbody.innerHTML = "";
        dbVoceros.forEach(v => {
            tbody.innerHTML += `<tr><td>${v.nom} ${v.ape}</td><td>${v.ced}</td><td>${v.tel}</td><td>${v.cor}</td><td>${v.com}</td><td>${v.voceria}</td></tr>`;
        });
    }

    function guardarMapaActual() {
        const c = document.getElementById('comunaActiva').value;
        if(!c) return alert("No hay comuna seleccionada");
        dbMapasCount[c]++;
        localStorage.setItem('SIG_Mapas_Count', JSON.stringify(dbMapasCount));
        alert("Mapa guardado en la memoria de la comuna: " + c);
        if(rolUsuario === 'admin') mostrarPanelAdmin();
    }

    // --- MAPA ---
    function inicializarMapa() {
        if(map) return;
        map = L.map('map').setView([10.136, -64.686], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }

    function activarEmoji(e, id) {
        alert("Marcador " + e + " activado para colocar en el mapa.");
    }

    function cambiarSeccion(tipo) {
        document.getElementById('form-registro-principal').style.display = (tipo === 'registro') ? 'grid' : 'none';
        document.getElementById('form-admin-acceso').style.display = (tipo === 'admin') ? 'grid' : 'none';
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (tipo==='registro'&&i===0)||(tipo==='admin'&&i===1)));
    }

    function controlarOtro(v) { document.getElementById('segmento-otro').style.display = (v === 'otro') ? 'block' : 'none'; }
    function limpiarCampos() { document.querySelectorAll('#campos-dinamicos-registro input').forEach(i => i.value = ""); }
    function limpiarSiVacio(v) { if(!v) document.getElementById('campos-dinamicos-registro').style.display = 'none'; }
</script>

</body>
</html>
